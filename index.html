<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bounce Catch - 第35弾</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff3e0; font-family: sans-serif; touch-action: none; }
        #ad-top, #ad-bottom { position: fixed; left: 0; width: 100%; height: 150px; background: #333; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #ad-top { top: 0; } #ad-bottom { bottom: 0; }
        iframe { border: none; width: 100%; height: 150px; }
        #main-container { margin-top: 150px; height: calc(100vh - 300px); position: relative; display: flex; flex-direction: column; align-items: center; }
        #ui { padding: 10px; font-size: 22px; font-weight: bold; color: #ff9800; }
        #game-area { width: 100%; height: calc(100% - 150px); position: relative; overflow: hidden; } /* 下にバケツがあるため高さを調整 */
        .falling-num { 
            position: absolute; width: 40px; height: 40px; background: #ffc107; color: white; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 20px; font-weight: bold; top: -50px; left: 0; box-shadow: 0 2px #ffb300;
        }
        #buckets-container { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; 
            display: flex; justify-content: space-around; background: #795548; padding-top: 5px; box-shadow: 0 -3px #5d4037;
        }
        .bucket { 
            width: 60px; height: 60px; background: #ff9800; color: white; 
            border-radius: 10px; display: flex; align-items: center; justify-content: center; 
            font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 4px #ef6c00;
        }
        #end-menu { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.95); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 60; 
        }
        .menu-btn { width: 220px; padding: 15px; margin: 10px; font-size: 20px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; }
        #retry-btn { background: #ff9800; color: white; }
        #more-games-btn { background: #ff4081; color: white; }
    </style>
</head>
<body>
    <div id="ad-top"><iframe src="ad.html"></iframe></div>
    <div id="ad-bottom"><iframe src="ad.html"></iframe></div>
    <div id="main-container">
        <div id="ui">SCORE: 0</div>
        <div id="game-area"></div>
        <div id="buckets-container"></div>
        <div id="end-menu">
            <h2 id="result-msg">Bounce Catch</h2>
            <button id="retry-btn" class="menu-btn" onclick="startNewGame()">スタート！</button>
            <a href="https://saaaachi.github.io/Color-Shuffle/" id="more-games-btn" class="menu-btn">他のゲームはこちら</a>
        </div>
    </div>
    <script>
        let score = 0, gameActive = false, fallingInterval, fallSpeed = 20, maxFalling = 3;
        const gameArea = document.getElementById("game-area");
        const bucketsContainer = document.getElementById("buckets-container");
        const numbers = [1, 2, 3, 4]; // 使用する数字

        let activeFallingNums = [];

        function startNewGame() {
            document.getElementById("end-menu").style.display = "none";
            score = 0; gameActive = true;
            document.getElementById("ui").innerText = "SCORE: 0";
            gameArea.innerHTML = "";
            activeFallingNums = [];
            fallSpeed = 20; maxFalling = 3; // 初期設定に戻す
            createBuckets();
            startFalling();
        }

        function createBuckets() {
            bucketsContainer.innerHTML = "";
            numbers.forEach(num => {
                const bucket = document.createElement("div");
                bucket.className = "bucket";
                bucket.innerText = num;
                bucket.onclick = () => catchNum(num);
                bucketsContainer.appendChild(bucket);
            });
        }

        function startFalling() {
            clearInterval(fallingInterval);
            fallingInterval = setInterval(() => {
                if(activeFallingNums.length < maxFalling) {
                    spawnFallingNum();
                }
                moveFallingNums();
            }, fallSpeed);
        }

        function spawnFallingNum() {
            const num = numbers[Math.floor(Math.random() * numbers.length)];
            const falling = document.createElement("div");
            falling.className = "falling-num";
            falling.innerText = num;
            falling.dataset.value = num;
            falling.style.left = Math.random() * (gameArea.offsetWidth - 40) + "px";
            gameArea.appendChild(falling);
            activeFallingNums.push(falling);
        }

        function moveFallingNums() {
            const bucketTop = bucketsContainer.offsetTop;
            activeFallingNums.forEach((falling, index) => {
                let currentTop = parseInt(falling.style.top);
                falling.style.top = (currentTop + 5) + "px"; // 落下速度
                if (currentTop + 40 > bucketTop) { // バケツの高さに到達したら
                    // バケツでキャッチされなかった場合はミス
                    gameOver(`取り逃がした！\nSCORE: ${score}`);
                }
            });
            // 画面外に出てしまった（ミスでゲームオーバーになるので基本的にここには来ない）
            activeFallingNums = activeFallingNums.filter(f => parseInt(f.style.top) < gameArea.offsetHeight);
        }

        function catchNum(bucketNum) {
            if(!gameActive) return;
            // 一番下にある数字を探す（一番落下しているもの）
            let caught = null;
            let lowestTop = -1;
            activeFallingNums.forEach(f => {
                const currentTop = parseInt(f.style.top);
                if (currentTop > lowestTop && currentTop + 40 > bucketsContainer.offsetTop - 50 ) { // バケツの少し上まで来ているもの
                    lowestTop = currentTop;
                    caught = f;
                }
            });

            if (caught && parseInt(caught.dataset.value) === bucketNum) {
                score++;
                document.getElementById("ui").innerText = "SCORE: " + score;
                caught.remove();
                activeFallingNums = activeFallingNums.filter(f => f !== caught);
                
                // 難易度調整
                if(score % 5 === 0) { // 5点ごとに難易度アップ
                    if(fallSpeed > 5) fallSpeed -= 1; // 落下速度アップ
                    if(maxFalling < 8) maxFalling++; // 同時落下数増加
                    startFalling(); // インターバルを更新
                }
            } else if (caught && parseInt(caught.dataset.value) !== bucketNum) {
                gameOver(`数字が違うよ！\nSCORE: ${score}`);
            }
        }

        function gameOver(msg) {
            gameActive = false;
            clearInterval(fallingInterval);
            document.getElementById("result-msg").innerText = msg;
            document.getElementById("end-menu").style.display = "flex";
            document.getElementById("retry-btn").innerText = "もう一度遊ぶ";
        }
        window.onload = () => { document.getElementById("end-menu").style.display = "flex"; };
        setInterval(() => { const fs = document.querySelectorAll('iframe'); fs.forEach(f => { const s = f.src; f.src = "about:blank"; setTimeout(() => f.src = s, 100); }); }, 30000);
    </script>
</body>
</html>
