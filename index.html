<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bounce Catch - 第35弾</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #fff3e0; font-family: sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; }
        
        /* 広告枠：100px */
        #ad-top, #ad-bottom { position: fixed; left: 0; width: 100%; height: 100px; background: #333; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #ad-top { top: 0; } #ad-bottom { bottom: 0; }
        iframe { border: none; width: 100%; height: 100px; }

        /* ゲーム本体エリア */
        #game-outer { position: absolute; top: 100px; bottom: 100px; left: 0; right: 0; background: #fff3e0; overflow: hidden; display: flex; flex-direction: column; }
        
        #header-ui { width: 100%; display: flex; justify-content: space-around; padding: 8px 0; background: rgba(255,255,255,0.5); z-index: 10; flex-shrink: 0; }
        .ui-box { padding: 4px 10px; border-radius: 12px; font-weight: bold; font-size: 16px; color: #e65100; background: white; box-shadow: 0 2px #ffb74d; }

        #game-canvas { flex-grow: 1; position: relative; width: 100%; overflow: hidden; }
        
        .falling-num { 
            position: absolute; width: 45px; height: 45px; background: #ff9800; color: white; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 22px; font-weight: bold; box-shadow: 0 4px #ef6c00;
            user-select: none;
        }

        /* 操作ボタンエリア */
        #buckets { width: 100%; height: 70px; display: flex; justify-content: space-around; align-items: center; background: #795548; flex-shrink: 0; }
        .bucket { 
            width: 22%; height: 55px; background: #ffb74d; color: white; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; font-size: 24px; 
            font-weight: bold; box-shadow: 0 4px #e65100; cursor: pointer;
            touch-action: none; user-select: none;
        }
        .bucket:active { transform: translateY(2px); box-shadow: 0 2px #e65100; }

        /* メニュー画面：スクロール対応 */
        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.96); display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start; z-index: 50; 
            padding: 5px 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
        }

        #ad-middle-container { width: 300px; height: 120px; background: #000; margin: 5px 0; display: none; justify-content: center; align-items: center; overflow: hidden; flex-shrink: 0; }

        .menu-btn-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 8px; padding-bottom: 20px; }
        .menu-btn { width: 220px; padding: 12px; font-size: 18px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; }
        #retry-btn { background: #ff9800; color: white; box-shadow: 0 4px #e65100; }
        #more-games-btn { background: #ff4081; color: white; box-shadow: 0 4px #c2185b; }
    </style>
</head>
<body>

    <div id="ad-top"><iframe id="frame-top" src="ad.html"></iframe></div>

    <div id="game-outer">
        <div id="header-ui">
            <div id="score-display" class="ui-box">SCORE: 0</div>
            <div id="speed-display" class="ui-box">SPEED: 1</div>
        </div>
        
        <div id="game-canvas"></div>

        <div id="buckets">
            <div class="bucket" onclick="catchNum(1)">1</div>
            <div class="bucket" onclick="catchNum(2)">2</div>
            <div class="bucket" onclick="catchNum(3)">3</div>
            <div class="bucket" onclick="catchNum(4)">4</div>
        </div>

        <div id="menuScreen">
            <h2 id="result-msg" style="color:#e65100; margin: 10px 0; font-size: 24px;">Bounce Catch</h2>
            <p style="font-size: 13px; color: #666; margin: 0; text-align: center;">落ちてくる数字と同じボタンをタップ！</p>
            
            <div id="ad-middle-container">
                <script src="https://adm.shinobi.jp/s/1e6de436ea850948e238e975a93767eb"></script>
            </div>

            <div class="menu-btn-group">
                <button id="retry-btn" class="menu-btn" onclick="startNewGame()">スタート！</button>
                <a href="https://saaaachi.github.io/Color-Shuffle/" id="more-games-btn" class="menu-btn">他のゲームはこちら</a>
            </div>
        </div>
    </div>

    <div id="ad-bottom"><iframe id="frame-bottom" src="ad.html"></iframe></div>

    <script>
        let score = 0, gameActive = false, gameLoop, spawnTimer;
        let speed = 2, spawnRate = 2000;
        const canvas = document.getElementById("game-canvas");
        const menuScreen = document.getElementById("menuScreen");
        const adMid = document.getElementById("ad-middle-container");
        const resultMsg = document.getElementById("result-msg");
        const retryBtn = document.getElementById("retry-btn");
        const nums = [];

        function startNewGame() {
            menuScreen.style.display = "none";
            adMid.style.display = "none";
            score = 0; speed = 3; spawnRate = 1800; gameActive = true;
            nums.forEach(n => n.el.remove());
            nums.length = 0;
            updateUI();
            
            clearInterval(gameLoop);
            clearTimeout(spawnTimer);
            
            gameLoop = setInterval(update, 20);
            spawn();
        }

        function spawn() {
            if(!gameActive) return;
            const val = Math.floor(Math.random() * 4) + 1;
            const el = document.createElement("div");
            el.className = "falling-num";
            el.innerText = val;
            el.style.left = Math.random() * (canvas.offsetWidth - 50) + "px";
            el.style.top = "-50px";
            canvas.appendChild(el);
            nums.push({ el, val, y: -50 });

            const nextSpawn = Math.max(600, spawnRate - (score * 20));
            spawnTimer = setTimeout(spawn, nextSpawn);
        }

        function update() {
            if(!gameActive) return;
            for(let i = nums.length - 1; i >= 0; i--) {
                nums[i].y += speed + (score * 0.05);
                nums[i].el.style.top = nums[i].y + "px";

                if(nums[i].y > canvas.offsetHeight) {
                    gameOver("見逃した！😱");
                    break;
                }
            }
        }

        function catchNum(val) {
            if(!gameActive) return;
            let targetIdx = -1;
            let lowestY = -1;

            for(let i = 0; i < nums.length; i++) {
                if(nums[i].y > lowestY) {
                    lowestY = nums[i].y;
                    targetIdx = i;
                }
            }

            if(targetIdx !== -1) {
                if(nums[targetIdx].val === val) {
                    score++;
                    nums[targetIdx].el.remove();
                    nums.splice(targetIdx, 1);
                    updateUI();
                } else {
                    gameOver("ちがう数字だよ！❌");
                }
            }
        }

        function updateUI() {
            document.getElementById("score-display").innerText = "SCORE: " + score;
            document.getElementById("speed-display").innerText = "SPEED: " + (speed + (score * 0.05)).toFixed(1);
        }

        function gameOver(msg) {
            gameActive = false;
            clearInterval(gameLoop);
            clearTimeout(spawnTimer);
            resultMsg.innerText = msg + "\nSCORE: " + score;
            retryBtn.innerText = "もう一度遊ぶ";
            adMid.style.display = "flex";
            menuScreen.style.display = "flex";
            menuScreen.scrollTop = 0;
        }

        function refreshAds() {
            const t = document.getElementById('frame-top');
            const b = document.getElementById('frame-bottom');
            if(t) t.src = t.src;
            if(b) b.src = b.src;
        }
        setInterval(refreshAds, 30000);

        window.onload = () => { menuScreen.style.display = "flex"; };
    </script>
</body>
</html>
